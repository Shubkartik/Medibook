{% extends 'base.html' %}

{% block title %}Profile Settings - MediBook{% endblock %}
{% block page_title %}Profile Settings{% endblock %}

{% block content %}
<!-- Profile settings card container -->
<div class="glass-card" style="max-width: 600px; margin: 0 auto; animation: fadeIn 0.5s ease;">
    <!-- User avatar and role section -->
    <div style="text-align: center; margin-bottom: 30px;">
        <!-- User initials avatar circle -->
        <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); 
                   display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; margin: 0 auto 16px;">
            {{ user.first_name|first }}{{ user.last_name|first }}
        </div>
        <h3>{{ user.get_full_name }}</h3>
        <p style="color: var(--text-secondary); text-transform: capitalize;">{{ user.profile.role }}</p>
    </div>
    
    <!-- Profile edit form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Two column grid for form fields -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <!-- First name input -->
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">First Name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}" 
                       style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 1rem;">
            </div>
            
            <!-- Last name input -->
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Last Name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}"
                       style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 1rem;">
            </div>
            
            <!-- Email input - spans full width -->
            <div style="grid-column: 1 / -1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                <input type="email" name="email" value="{{ user.email }}"
                       style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 1rem;">
            </div>
            
            <!-- Phone number input - spans full width -->
            <div style="grid-column: 1 / -1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Phone Number</label>
                <input type="text" name="phone" value="{{ user.profile.phone }}"
                       style="width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 1rem;">
            </div>
        </div>
        
        <!-- Submit button -->
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px; padding: 14px; justify-content: center;">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </form>
</div>

<!-- Fade-in animation CSS -->
<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
